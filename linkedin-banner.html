<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quoteworthy — LinkedIn banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1f2937; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: "Geist", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif; }
  .banner {
    width: 1584px;
    height: 396px;
    position: relative;
    background: #0A1628;
    overflow: hidden;
    color: #ffffff;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle dotted grid wash */
  .banner::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: 0 0;
    pointer-events: none;
  }

  /* Decorative scattered quote marks (very faint) */
  .deco {
    position: absolute;
    color: rgba(16, 185, 129, 0.07);
    font-family: "Geist", sans-serif;
    font-weight: 700;
    pointer-events: none;
    user-select: none;
    line-height: 0.8;
  }
  .deco.q1 { top: -40px;  right: 60px;  font-size: 320px; color: rgba(16,185,129,0.06); }
  .deco.q2 { bottom: -90px; left: 540px; font-size: 220px; color: rgba(255,255,255,0.035); }
  .deco.q3 { top: 70px; left: 1140px; font-size: 90px; color: rgba(16,185,129,0.10); }

  /* Profile-photo safe zone marker (debug only — hidden by default) */
  .safe { display: none; position: absolute; left: 84px; bottom: 28px; width: 260px; height: 260px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.18); }

  /* Logo + wordmark cluster, left column */
  .left {
    position: absolute;
    left: 380px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .mark {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .mark svg { width: 100%; height: 100%; }
  .wordmark { display: flex; flex-direction: column; gap: 6px; }
  .wordmark .name {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1;
    color: #ffffff;
  }
  .wordmark .name .slash { color: #10B981; margin: 0 6px; font-weight: 500; }
  .wordmark .role {
    font-size: 16px;
    font-weight: 500;
    color: #9CA3AF;
    letter-spacing: 0.01em;
  }

  /* Right column: tagline + meta */
  .right {
    position: absolute;
    right: 88px;
    top: 50%;
    transform: translateY(-50%);
    width: 660px;
    text-align: right;
  }
  .eyebrow {
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #10B981;
    margin-bottom: 18px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 0 4px rgba(16,185,129,0.18);
    display: inline-block;
  }
  .tagline {
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.08;
    color: #ffffff;
    margin: 0;
    text-wrap: balance;
  }
  .tagline em {
    font-style: normal;
    color: #10B981;
    position: relative;
  }
  .meta {
    margin-top: 22px;
    display: flex;
    justify-content: flex-end;
    gap: 22px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px;
    color: #94A3B8;
    font-weight: 500;
  }
  .meta span { display: inline-flex; align-items: center; gap: 8px; }
  .meta i { width: 6px; height: 6px; border-radius: 50%; background: #64748B; display: inline-block; }

  /* Vertical separator between columns */
  .rule {
    position: absolute;
    left: 600px; top: 84px; bottom: 84px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.10) 30%, rgba(255,255,255,0.10) 70%, transparent);
  }

  /* Bottom-right URL */
  .url {
    position: absolute;
    right: 88px;
    bottom: 28px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.32);
    letter-spacing: 0.04em;
  }
  .url b { color: rgba(255,255,255,0.55); font-weight: 500; }

  /* Build-in-public badge */
  .badge {
    position: absolute;
    left: 380px;
    bottom: 28px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.06em;
    background: rgba(255,255,255,0.02);
  }
  .badge .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #10B981;
    position: relative;
  }
  .badge .pulse::after {
    content: "";
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: #10B981;
    opacity: 0.25;
  }
</style>
</head>
<body>
  <div class="banner" data-screen-label="LinkedIn banner">
    <!-- Decorative giant glyphs -->
    <div class="deco q1">”</div>
    <div class="deco q2">“</div>
    <div class="deco q3">”</div>

    <!-- Profile-photo safe zone (hidden, kept for reference) -->
    <div class="safe"></div>

    <!-- Vertical divider -->
    <div class="rule"></div>

    <!-- Left: mark + wordmark -->
    <div class="left">
      <div class="mark">
        <!-- Inner Cite (variant D): Q ring + emerald quote inside -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="46" cy="46" r="30" fill="none" stroke="#FFFFFF" stroke-width="8"/>
          <rect x="58" y="60" width="26" height="8" rx="2" fill="#FFFFFF" transform="rotate(45 71 64)"/>
          <g fill="#10B981">
            <path d="M34 32 L44 32 L44 44 L38 58 L34 58 Z"/>
            <path d="M48 32 L58 32 L58 44 L52 58 L48 58 Z"/>
          </g>
        </svg>
      </div>
      <div class="wordmark">
        <div class="name">Quoteworthy<span class="slash">/</span></div>
        <div class="role">AI-Search-Optimized content for marketing consultants</div>
      </div>
    </div>

    <!-- Right: tagline + meta -->
    <div class="right">
      <div class="eyebrow">Open-source · Build in public</div>
      <h1 class="tagline">Content <em>AI wants to quote</em>.</h1>
      <div class="meta">
        <span><i></i>LinkedIn + WordPress + Webflow</span>
        <span><i></i>Princeton GEO factors</span>
        <span><i></i>Multi-brand</span>
      </div>
    </div>

    <!-- Bottom-right URL -->
    <div class="url">github.com/<b>GrigoriyBaranchuk/quoteworthy</b></div>

    <!-- Build-in-public pulse badge -->
    <div class="badge"><span class="pulse"></span>SPRINT 0 · LIVE</div>
  </div>
</body>
</html>
